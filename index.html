<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08111e" />
    <title>ACE Academy Manager</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>
    <div id="boot-screen" class="boot-screen">
      <div class="boot-card glass-card">
        <span class="eyebrow">Carregando build premium</span>
        <h1>ACE Academy Manager</h1>
        <p>Preparando calendário ATP 2026, ranking mundial, mercados e Match Center.</p>
      </div>
    </div>

    <div class="app-shell">
      <aside class="shell-rail glass-card">
        <div class="rail-brand">
          <img src="assets/icons/logo-mark.svg" alt="ACE" />
          <div>
            <span class="eyebrow">AAA Mobile-first</span>
            <strong>ACE Manager</strong>
          </div>
        </div>
        <div class="rail-nav">
          <button class="nav-btn" data-nav-view="dashboard"><span class="nav-icon"></span><span>HQ</span></button>
          <button class="nav-btn" data-nav-view="training"><span class="nav-icon"></span><span>Treino</span></button>
          <button class="nav-btn" data-nav-view="calendar"><span class="nav-icon"></span><span>Calendário</span></button>
          <button class="nav-btn" data-nav-view="ranking"><span class="nav-icon"></span><span>Ranking</span></button>
          <button class="nav-btn" data-nav-view="market"><span class="nav-icon"></span><span>Mercado</span></button>
          <button class="nav-btn" data-nav-view="match"><span class="nav-icon"></span><span>Match Center</span></button>
        </div>
      </aside>

      <main class="shell-main">
        <header class="topbar glass-card">
          <div id="topbar-meta"></div>
          <div id="resource-strip" class="resource-strip"></div>
        </header>

        <section id="hero-banner" class="hero-banner"></section>

        <section class="content-grid">
          <div class="views-stack">
            <section class="view-panel" data-view="dashboard">
              <div id="dashboard-view"></div>
            </section>
            <section class="view-panel" data-view="training">
              <div id="training-view"></div>
            </section>
            <section class="view-panel" data-view="calendar">
              <div id="calendar-view"></div>
            </section>
            <section class="view-panel" data-view="ranking">
              <div id="ranking-view"></div>
            </section>
            <section class="view-panel" data-view="market">
              <div id="market-view"></div>
            </section>
            <section class="view-panel" data-view="match">
              <div class="section-stack">
                <div id="match-summary"></div>
                <div class="glass-card section-card">
                  <div class="section-head"><h3>Quadra 2D</h3><span>Intervenção tática em tempo real</span></div>
                  <div class="match-canvas-wrap">
                    <canvas id="live-match-canvas" aria-label="Quadra 2D do Match Center"></canvas>
                  </div>
                </div>
                <div class="dual-grid">
                  <div id="match-live-status"></div>
                  <div id="match-live-score"></div>
                </div>
                <div class="dual-grid">
                  <div id="match-log-feed"></div>
                  <div id="match-history"></div>
                </div>
              </div>
            </section>
          </div>
          <aside class="notifications-column">
            <div class="glass-card section-card sticky-card">
              <div class="section-head"><h3>Pulse Feed</h3><span>Academia ao vivo</span></div>
              <div id="notifications" class="notifications-stack"></div>
              <button class="button-tertiary full-width" data-action="reset-save">Resetar save local</button>
            </div>
          </aside>
        </section>
      </main>
    </div>

    <nav class="bottom-nav glass-card">
      <button class="nav-btn" data-nav-view="dashboard"><span class="nav-icon"></span><span>HQ</span></button>
      <button class="nav-btn" data-nav-view="training"><span class="nav-icon"></span><span>Treino</span></button>
      <button class="nav-btn" data-nav-view="calendar"><span class="nav-icon"></span><span>Agenda</span></button>
      <button class="nav-btn" data-nav-view="ranking"><span class="nav-icon"></span><span>Rank</span></button>
      <button class="nav-btn" data-nav-view="market"><span class="nav-icon"></span><span>Mercado</span></button>
      <button class="nav-btn" data-nav-view="match"><span class="nav-icon"></span><span>Jogo</span></button>
    </nav>

    <script type="module" src="js/main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
      }
    </script>

  </body>
</html>
